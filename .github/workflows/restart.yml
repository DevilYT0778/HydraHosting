name: Auto Restart Codespace

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Check and restart Codespace
        run: |
          STATE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/codespaces/${{ secrets.CODESPACE_NAME }}" \
            | jq -r '.state')

          echo "Current state: $STATE"

          if [ "$STATE" != "Available" ]; then
            echo "Offline! Restarting..."
            curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user/codespaces/${{ secrets.CODESPACE_NAME }}/start"
            echo "Restart triggered!"
          else
            echo "Already running!"
          fi
